# City configuration for Inside Airbnb data acquisition.
#
# Each city entry defines the data source URL, metadata, and files to download.
# The base_url follows Inside Airbnb's directory structure:
#   https://data.insideairbnb.com/{country}/{state}/{city}/{scrape_date}/
#
# IMPORTANT: Update 'scrape_date' to the latest available snapshot from
#   http://insideairbnb.com/get-the-data before running the downloader.

cities:
  paris:
    display_name: "Paris"
    country: france
    state: ile-de-france
    city_slug: paris
    currency_code: EUR
    currency_symbol: "€"
    timezone: "Europe/Paris"
    scrape_date: "2025-09-12"
    admin_unit_name: "Arrondissement"
    files:
      detailed:
        - listings.csv.gz
        - calendar.csv.gz
        - reviews.csv.gz
      summary:
        - listings.csv
        - reviews.csv
        - neighbourhoods.csv
        - neighbourhoods.geojson

  new_york_city:
    display_name: "New York City"
    country: united-states
    state: ny
    city_slug: new-york-city
    currency_code: USD
    currency_symbol: "$"
    timezone: "America/New_York"
    scrape_date: "2026-04-14"
    admin_unit_name: "Borough"
    files:
      detailed:
        - listings.csv.gz
        - calendar.csv.gz
        - reviews.csv.gz
      summary:
        - listings.csv
        - reviews.csv
        - neighbourhoods.csv
        - neighbourhoods.geojson

  barcelona:
    display_name: "Barcelona"
    country: spain
    state: catalonia
    city_slug: barcelona
    currency_code: EUR
    currency_symbol: "€"
    timezone: "Europe/Barcelona"
    scrape_date: "2026-03-21"
    admin_unit_name: "Borough"
    files:
      detailed:
        - listings.csv.gz
        - calendar.csv.gz
        - reviews.csv.gz
      summary:
        - listings.csv
        - reviews.csv
        - neighbourhoods.csv
        - neighbourhoods.geojson
